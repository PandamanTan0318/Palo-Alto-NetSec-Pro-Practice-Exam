<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSP Practice Exam</title>
<style>
  :root{
    --bg:#12161c;
    --surface:#1a2028;
    --surface-2:#212934;
    --line:#2b3440;
    --text:#e7ebf0;
    --muted:#8b96a5;
    --accent:#d9a441;
    --accent-dim:#7a6230;
    --good:#4fae82;
    --good-bg:#173428;
    --bad:#e0656a;
    --bad-bg:#3a2024;
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 15% 0%, #1a212c 0%, var(--bg) 55%);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:32px 16px 64px;
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* Header */
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;}
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
  .timer{font-family:var(--mono);font-size:12px;color:var(--muted);}
  h1{font-size:22px;margin:4px 0 18px;font-weight:650;letter-spacing:-.01em;}

  /* Segmented progress = "session path" motif */
  .path{display:flex;gap:3px;margin-bottom:22px;}
  .seg{flex:1;height:6px;border-radius:2px;background:var(--surface-2);position:relative;overflow:hidden;}
  .seg.done{background:var(--accent-dim);}
  .seg.correct{background:var(--good);}
  .seg.incorrect{background:var(--bad);}
  .seg.current::after{content:'';position:absolute;inset:0;background:var(--accent);animation:pulse 1.6s ease-in-out infinite;}
  .seg.flagged::before{content:'';position:absolute;top:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--text);z-index:2;}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

  .meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
  .meta-left{display:flex;flex-direction:column;gap:2px;}
  .meta-right{display:flex;align-items:center;gap:8px;}
  .qcount{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .live-score{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .domain-tag{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-dim);padding:3px 9px;border-radius:20px;}

  /* Card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:26px 24px;}
  .qtext{font-size:17px;line-height:1.5;font-weight:560;margin:0 0 20px;}

  .opt{
    display:flex;align-items:flex-start;gap:12px;
    width:100%;text-align:left;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 15px;
    margin-bottom:10px;
    color:var(--text);
    font-family:var(--sans);
    font-size:14.5px;
    line-height:1.45;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .opt:hover:not(:disabled){border-color:var(--accent-dim);}
  .opt:active:not(:disabled){transform:scale(.995);}
  .opt:disabled{cursor:default;}
  .opt .letter{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    border:1px solid var(--line);border-radius:5px;
    width:22px;height:22px;flex:0 0 22px;
    display:flex;align-items:center;justify-content:center;
    margin-top:1px;
  }
  .opt.pending{border-color:var(--accent);background:#2a2211;}
  .opt.pending .letter{border-color:var(--accent);color:var(--accent);}
  .opt.selected-correct{border-color:var(--good);background:var(--good-bg);}
  .opt.selected-correct .letter{border-color:var(--good);color:var(--good);}
  .opt.selected-incorrect{border-color:var(--bad);background:var(--bad-bg);}
  .opt.selected-incorrect .letter{border-color:var(--bad);color:var(--bad);}
  .opt.reveal-correct{border-color:var(--good);}
  .opt.reveal-correct .letter{border-color:var(--good);color:var(--good);}

  .explain{
    margin-top:16px;padding:14px 16px;
    background:var(--surface-2);border-left:3px solid var(--accent);
    border-radius:0 8px 8px 0;
    font-size:13.5px;line-height:1.55;color:var(--muted);
    display:none;
  }
  .explain b{color:var(--text);}
  .explain.show{display:block;}

  .footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
  .kbd-hint{margin-top:14px;font-size:11px;color:var(--muted);text-align:center;}
  .btn{
    font-family:var(--sans);font-size:14px;font-weight:600;
    padding:11px 20px;border-radius:9px;border:none;cursor:pointer;
    transition:opacity .15s ease, transform .1s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#1a1305;}
  .btn-primary:hover:not(:disabled){opacity:.9;}
  .btn-ghost{background:none;color:var(--muted);border:1px solid var(--line);}
  .btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--muted);}

  .flag-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
  .flag-btn:hover{border-color:var(--accent-dim);color:var(--text);}
  .flag-btn.active{border-color:var(--accent);color:var(--accent);background:#2a2211;}

  .menu-link{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;padding:0;text-align:left;margin-bottom:4px;}
  .menu-link:hover{color:var(--accent);}

  /* View toggling */
  .setup{display:block;}
  .setup.hide{display:none;}
  .quiz{display:block;}
  .quiz.hide{display:none;}
  .results{display:none;}
  .results.show{display:block;}

  /* Setup screen */
  .section-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;}
  .section-label:first-of-type{margin-top:0;}
  input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;flex:0 0 16px;}
  .domain-check-list{display:flex;flex-direction:column;gap:8px;}
  .domain-check{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;font-size:14px;cursor:pointer;}
  .domain-check-count{color:var(--muted);font-weight:400;}
  .count-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .count-input{width:70px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:14px;}
  .preset-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:var(--sans);}
  .preset-btn:hover{border-color:var(--accent-dim);color:var(--text);}
  .pool-note{margin-left:auto;font-size:12px;color:var(--muted);font-family:var(--mono);}
  .toggle-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:10px;cursor:pointer;}
  .setup-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px;flex-wrap:wrap;}
  .setup-actions .btn-primary{flex:1;min-width:160px;}

  /* Results screen */
  .score-hero{text-align:center;padding:36px 20px 28px;}
  .score-num{font-family:var(--mono);font-size:56px;font-weight:700;color:var(--accent);line-height:1;}
  .score-pct{font-size:26px;color:var(--muted);font-weight:500;margin-left:6px;}
  .score-label{color:var(--muted);font-size:13px;margin-top:8px;letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono);}
  .verdict{font-size:15px;margin-top:14px;color:var(--text);max-width:440px;margin-left:auto;margin-right:auto;line-height:1.5;}

  .domain-breakdown{margin-top:8px;}
  .domain-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .domain-row:last-child{border-bottom:none;}
  .domain-name{flex:1;font-size:13.5px;}
  .domain-bar-track{flex:1.4;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
  .domain-bar-fill{height:100%;border-radius:4px;background:var(--accent);}
  .domain-score{font-family:var(--mono);font-size:12px;color:var(--muted);width:82px;text-align:right;white-space:nowrap;}

  .results-actions{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
  .results-actions .btn{flex:1;min-width:140px;}

  /* History / Trouble Spots modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;width:100%;max-width:520px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);gap:10px;}
  .modal-tabs{display:flex;gap:6px;}
  .tab-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:var(--sans);}
  .tab-btn.active{border-color:var(--accent);color:var(--accent);}
  .modal-close{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 8px;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:14px 16px;overflow-y:auto;flex:1;}
  .modal-footer{padding:12px 16px;border-top:1px solid var(--line);}
  .hist-row{padding:10px 0;border-bottom:1px solid var(--line);}
  .hist-row:last-child{border-bottom:none;}
  .hist-score{font-family:var(--mono);font-size:14px;}
  .hist-pct{color:var(--muted);}
  .hist-date{font-size:12px;color:var(--muted);margin-top:2px;}
  .hist-domain{font-family:var(--mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
  .hist-qtext{font-size:13.5px;line-height:1.4;margin-bottom:4px;}
  .hist-tag{font-family:var(--mono);font-size:10px;color:var(--accent);border:1px solid var(--accent-dim);padding:1px 6px;border-radius:10px;margin-left:6px;}

  @media(max-width:480px){
    .card{padding:20px 16px;}
    .score-num{font-size:44px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="brand">NSP · Practice Exam</div>
    <div class="timer" id="timer">00:00</div>
  </div>
  <h1>Network Security Professional</h1>

  <div id="setupView" class="setup">
    <div class="card">
      <p class="qtext" style="margin-bottom:6px;">Configure Your Exam</p>
      <div style="color:var(--muted);font-size:13px;margin-bottom:18px;">Choose domains, length, and mode, then start.</div>

      <div class="section-label">Domains</div>
      <div class="domain-check-list" id="domainCheckList"></div>

      <div class="section-label">Question Count</div>
      <div class="count-row">
        <input type="number" id="countInput" class="count-input" min="1" value="200">
        <button type="button" class="preset-btn" data-count="10">10</button>
        <button type="button" class="preset-btn" data-count="25">25</button>
        <button type="button" class="preset-btn" data-count="50">50</button>
        <button type="button" class="preset-btn" data-count="75">75</button>
        <button type="button" class="preset-btn" data-count="100">100</button>
        <button type="button" class="preset-btn" data-count="150">150</button>
        <button type="button" class="preset-btn" data-count="200">200</button>
        <span class="pool-note" id="poolNote"></span>
      </div>

      <div class="section-label">Options</div>
      <label class="toggle-row" for="shuffleAnswersChk">
        <input type="checkbox" id="shuffleAnswersChk" checked>
        <span>Shuffle answer order (A/B/C/D) per question</span>
      </label>
      <label class="toggle-row" id="missedOnlyRow" for="missedOnlyChk" style="display:none;">
        <input type="checkbox" id="missedOnlyChk">
        <span id="missedOnlyLabel">Practice missed questions only</span>
      </label>

      <div class="setup-actions">
        <button class="btn btn-ghost" id="historyBtn" type="button">History &amp; Trouble Spots</button>
        <button class="btn btn-primary" id="startBtn" type="button">Start Exam →</button>
      </div>
    </div>
  </div>

  <div id="quizView" class="quiz hide">
    <div class="path" id="pathBar"></div>
    <div class="meta-row">
      <div class="meta-left">
        <button class="menu-link" id="mainMenuBtn" type="button">← Main Menu</button>
        <div class="qcount" id="qcount">Question 1 / 50</div>
        <div class="live-score" id="liveScore">Score: 0/0</div>
      </div>
      <div class="meta-right">
        <div class="domain-tag" id="domainTag">Domain 1</div>
        <button class="flag-btn" id="flagBtn" type="button">🚩 Flag</button>
      </div>
    </div>

    <div class="card">
      <p class="qtext" id="qtext"></p>
      <div id="optsWrap"></div>
      <div class="explain" id="explain"></div>
      <div class="footer-row">
        <button class="btn btn-ghost" id="prevBtn">← Previous</button>
        <button class="btn btn-primary" id="nextBtn" disabled>Next →</button>
      </div>
      <div class="kbd-hint">Shortcuts: A–D select · Enter/Space submit or next · ← previous · F flag</div>
    </div>
  </div>

  <div id="resultsView" class="results">
    <div class="card score-hero">
      <div class="score-num" id="finalScore">0/50</div>
      <div class="score-label">Final Score</div>
      <div class="verdict" id="verdictText"></div>
    </div>
    <div class="card" style="margin-top:14px;">
      <p class="qtext" style="margin-bottom:4px;">Score by Domain</p>
      <div class="domain-breakdown" id="domainBreakdown"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-ghost" id="reviewBtn">Review Answers</button>
      <button class="btn btn-primary" id="retryBtn">Retake (Same Settings)</button>
    </div>
    <div class="results-actions">
      <button class="btn btn-ghost" id="newSetupBtn">New Exam Setup</button>
    </div>
  </div>

</div>

<div class="modal-overlay" id="historyModal">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="attempts" type="button">Attempts</button>
        <button class="tab-btn" data-tab="missed" type="button">Trouble Spots</button>
      </div>
      <button class="modal-close" id="closeHistoryBtn" type="button">✕</button>
    </div>
    <div class="modal-body" id="attemptsTab"></div>
    <div class="modal-body" id="missedTab" style="display:none;"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="clearHistoryBtn" type="button" style="width:100%;">Clear All History</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
{d:"Domain 1: Network Security Fundamentals",q:"What is the primary function of App-ID on a Palo Alto Networks firewall?",o:["It assigns firewall interfaces to static routing tables", "It maps source ports to fixed destination services", "It schedules content signature package downloads", "It classifies traffic by app identity, not port"],c:3,e:"App-ID classifies traffic by application identity rather than relying on port or protocol alone."},
{d:"Domain 1: Network Security Fundamentals",q:"A session first shows as \"web-browsing\" then gets reclassified as \"youtube-base\" once more payload arrives. What does this show?",o:["A failed SSL decryption profile", "App-ID reclassifying the session mid-flight", "A misconfigured NAT translation rule", "An unexpected HA failover event"],c:1,e:"App-ID can reclassify a session as more payload is inspected — this is expected dynamic behavior, not an error."},
{d:"Domain 1: Network Security Fundamentals",q:"Which best describes the firewall's \"slow path\"?",o:["Processing reserved only for traffic that gets blocked", "Traffic sent through a second inline firewall", "A backup route used during a link failure", "Session setup: policy, NAT/route lookup, and App-ID init"],c:3,e:"Slow path = session setup: policy lookup, NAT/route lookup, App-ID/Content-ID initialization."},
{d:"Domain 1: Network Security Fundamentals",q:"After a session is established in the session table, how are later packets typically handled?",o:["Sent back through full policy lookup each time", "Held in a queue until the session times out", "Matched against the existing session, minimal added work", "Forwarded to Panorama for individual inspection"],c:2,e:"Established sessions are matched and forwarded via the fast path — minimal per-packet overhead."},
{d:"Domain 1: Network Security Fundamentals",q:"Which decryption type requires the firewall to hold a copy of the destination server's actual private key?",o:["No Decrypt", "SSL Forward Proxy", "SSL Inbound Inspection", "SSH Proxy"],c:2,e:"SSL Inbound Inspection requires the real server certificate and private key since the firewall is protecting a server it owns."},
{d:"Domain 1: Network Security Fundamentals",q:"Which decryption method should inspect outbound HTTPS traffic generated by internal users browsing external sites?",o:["No Decrypt", "SSL Inbound Inspection", "SSH Proxy", "SSL Forward Proxy"],c:3,e:"SSL Forward Proxy inspects outbound traffic from internal users heading to external sites."},
{d:"Domain 1: Network Security Fundamentals",q:"Why might an organization apply a \"No Decrypt\" rule to categories like financial services or health?",o:["App-ID cannot see those categories otherwise", "To meet privacy and regulatory requirements", "Those categories never use TLS", "It permanently disables logging for that traffic"],c:1,e:"No Decrypt policies are commonly applied to privacy-sensitive categories for regulatory/compliance reasons."},
{d:"Domain 1: Network Security Fundamentals",q:"Which feature lets policy reference usernames and group membership instead of static IP addresses?",o:["Zone-ID", "App-ID", "Content-ID", "User-ID"],c:3,e:"User-ID maps IPs to usernames/groups, enabling identity-based policy."},
{d:"Domain 1: Network Security Fundamentals",q:"What is required before traffic can pass between two interfaces, even if a route exists?",o:["Zone assignment plus a permitting policy", "A static ARP table entry", "A configured WildFire subscription", "An active decryption profile"],c:0,e:"Zones are mandatory — traffic without zone assignment cannot pass regardless of routing."},
{d:"Domain 1: Network Security Fundamentals",q:"Which engine applies antivirus, vulnerability protection, URL filtering, and file blocking after App-ID has classified a session?",o:["Device-ID", "GlobalProtect", "Content-ID", "User-ID"],c:2,e:"Content-ID handles real-time threat/data inspection once App-ID has identified the traffic."},
{d:"Domain 1: Network Security Fundamentals",q:"A firewall administrator wants to prevent SSH from being used to tunnel unauthorized traffic such as SFTP or port forwarding. Which feature addresses this?",o:["No Decrypt policy", "SSH Proxy", "Data filtering profile", "SSL Inbound Inspection"],c:1,e:"SSH Proxy decrypts SSH sessions so the firewall can see and control what's tunneled inside them."},
{d:"Domain 1: Network Security Fundamentals",q:"Which principle underlies Zero Trust architecture?",o:["Firewalls only need to inspect traffic crossing the internet edge", "Encryption is optional for internal traffic", "Access is least-privilege and continuously verified rather than assumed by location", "Trust is granted automatically once a device joins the internal network"],c:2,e:"Zero Trust means never trusting by default and continuously verifying access, regardless of network location."},
{d:"Domain 1: Network Security Fundamentals",q:"What is the main reason Device-ID exists as a policy construct, separate from User-ID?",o:["It's required for SSL decryption to function", "It removes the need for zones altogether", "IoT/OT devices can't authenticate or hold a fixed IP", "It works only on VM-Series firewalls"],c:2,e:"Device-ID lets policy reference a device's identity/category since many IoT/OT devices can't run agents or keep a fixed IP."},
{d:"Domain 1: Network Security Fundamentals",q:"Within a single zone, can security policy still be enforced between two hosts (intra-zone traffic)?",o:["Only when NAT is fully disabled", "Only on CN-Series firewall deployments", "No, only inter-zone traffic can ever be filtered", "Yes, intra-zone rules allow micro-segmentation within a zone"],c:3,e:"Intra-zone rules allow segmentation even among hosts sharing the same zone, useful for east-west traffic control."},
{d:"Domain 1: Network Security Fundamentals",q:"What happens if a decryption profile encounters an expired or untrusted certificate, by default configuration intent?",o:["Profile settings decide block-or-allow behavior, with logging", "The firewall always silently allows the session", "The firewall auto-reissues a valid certificate", "The session is always blocked with no logging"],c:0,e:"Decryption profiles let admins define behavior for failure conditions like untrusted or expired certificates."},
{d:"Domain 1: Network Security Fundamentals",q:"Which statement about the single-pass architecture in PAN-OS is accurate?",o:["It applies only to VM-Series deployments", "App-ID, Content-ID, and threat scanning run in one pass", "Only Layer 3 header information gets evaluated", "Each engine re-scans the full packet in sequence"],c:1,e:"Single-pass architecture avoids the performance cost of multiple, separate inspection engines scanning the same traffic."},
{d:"Domain 1: Network Security Fundamentals",q:"A firewall reclassifies an application mid-session and the previously matched security rule no longer applies. What generally happens next?",o:["Policy is re-evaluated against the newly identified application", "NAT is disabled for the remainder of the session", "The firewall ignores the new classification for that session", "The session is dropped permanently with no further evaluation"],c:0,e:"When App-ID updates its classification, policy is re-evaluated so enforcement matches the true application."},
{d:"Domain 2: NGFW & SASE Functionality",q:"Which firewall form factor is purpose-built to run inside Kubernetes clusters and secure container-to-container traffic?",o:["Cloud NGFW", "CN-Series", "PA-Series", "VM-Series"],c:1,e:"CN-Series is built specifically for Kubernetes/container environments."},
{d:"Domain 2: NGFW & SASE Functionality",q:"Which platform is a fully managed, SaaS-delivered firewall where Palo Alto Networks manages the underlying infrastructure?",o:["Prisma SD-WAN", "Cloud NGFW", "Panorama", "VM-Series"],c:1,e:"Cloud NGFW is the fully managed, SaaS-delivered firewall service."},
{d:"Domain 2: NGFW & SASE Functionality",q:"In an Active/Passive HA pair, what best describes the passive firewall under normal conditions?",o:["A hot standby that doesn't pass traffic normally", "It load-balances traffic evenly with the active node", "It performs logging duties and nothing else", "It exclusively handles NAT translation"],c:0,e:"In Active/Passive HA, the passive node is a hot standby and doesn't pass traffic under normal conditions."},
{d:"Domain 2: NGFW & SASE Functionality",q:"What does Prisma SD-WAN's path selection capability primarily do?",o:["Steering app traffic to the best circuit in real time", "Providing only static failover during a full outage", "Replacing zone-based segmentation at the branch", "Encrypting every packet regardless of its destination"],c:0,e:"Prisma SD-WAN continuously measures link quality and dynamically steers traffic to the best path."},
{d:"Domain 2: NGFW & SASE Functionality",q:"Which Prisma Access capability lets a user reach one specific private application without granting broader network access?",o:["ZTNA access scoped to one app", "SSL Forward Proxy decryption", "WildFire file analysis", "Best Practice Assessment scoring"],c:0,e:"ZTNA-based private app access lets users reach specific apps without full network access."},

QUESTIONS.forEach((q, i) => { q.id = i; });

function domainKey(d){ return d; }

function pctOf(numerator, denominator){
  return denominator > 0 ? Math.round((numerator/denominator)*100) : 0;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function loadHistory(){ try{ return JSON.parse(localStorage.getItem('nsp_history') || '[]'); }catch(e){ return []; } }
function saveHistory(list){ localStorage.setItem('nsp_history', JSON.stringify(list)); }
function recordAttempt(record){
  const list = loadHistory();
  list.unshift(record);
  saveHistory(list.slice(0, 25));
}

function loadMissed(){ try{ return JSON.parse(localStorage.getItem('nsp_missed') || '{}'); }catch(e){ return {}; } }
function saveMissed(stats){ localStorage.setItem('nsp_missed', JSON.stringify(stats)); }
function recordAnswerStat(id, wasCorrect){
  const stats = loadMissed();
  if(!stats[id]) stats[id] = {seen:0, missed:0};
  stats[id].seen++;
  if(!wasCorrect) stats[id].missed++;
  saveMissed(stats);
}

function computePool(domains, missedOnly){
  let pool = QUESTIONS.filter(q => domains.includes(domainKey(q.d)));
  if(missedOnly){
    const stats = loadMissed();
    pool = pool.filter(q => stats[q.id] && stats[q.id].missed > 0);
  }
  return pool;
}

function prepareQuestion(q, shuffleAnswers){
  if(!shuffleAnswers) return { id:q.id, d:q.d, q:q.q, o:q.o.slice(), c:q.c, e:q.e };
  const order = shuffle([0,1,2,3]);
  return { id:q.id, d:q.d, q:q.q, o:order.map(i => q.o[i]), c:order.indexOf(q.c), e:q.e };
}

let ORDERED_QUESTIONS = [];
let current = 0;
let answers = [];
let flagged = [];
let startTime = Date.now();
let timerInterval = null;
let pending = null;
let currentSettings = null;
let sessionCompleted = false;

const setupView = document.getElementById('setupView');
const domainCheckList = document.getElementById('domainCheckList');
const countInput = document.getElementById('countInput');
const poolNote = document.getElementById('poolNote');
const shuffleAnswersChk = document.getElementById('shuffleAnswersChk');
const missedOnlyRow = document.getElementById('missedOnlyRow');
const missedOnlyChk = document.getElementById('missedOnlyChk');
const missedOnlyLabel = document.getElementById('missedOnlyLabel');
const startBtn = document.getElementById('startBtn');
const historyBtn = document.getElementById('historyBtn');

const pathBar = document.getElementById('pathBar');
const qcount = document.getElementById('qcount');
const liveScoreEl = document.getElementById('liveScore');
const domainTag = document.getElementById('domainTag');
const flagBtn = document.getElementById('flagBtn');
const mainMenuBtn = document.getElementById('mainMenuBtn');
const qtext = document.getElementById('qtext');
const optsWrap = document.getElementById('optsWrap');
const explainBox = document.getElementById('explain');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const quizView = document.getElementById('quizView');
const resultsView = document.getElementById('resultsView');
const timerEl = document.getElementById('timer');
const retryBtn = document.getElementById('retryBtn');
const reviewBtn = document.getElementById('reviewBtn');
const newSetupBtn = document.getElementById('newSetupBtn');

const historyModal = document.getElementById('historyModal');
const attemptsTab = document.getElementById('attemptsTab');
const missedTab = document.getElementById('missedTab');
const closeHistoryBtn = document.getElementById('closeHistoryBtn');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');

function currentSelectedDomains(){
  return Array.from(domainCheckList.querySelectorAll('input:checked')).map(cb => cb.value);
}

function populateDomainChecklist(){
  const counts = {};
  QUESTIONS.forEach(q => { const k = domainKey(q.d); counts[k] = (counts[k] || 0) + 1; });
  domainCheckList.innerHTML = '';
  Object.keys(counts).forEach(key => {
    const label = document.createElement('label');
    label.className = 'domain-check';
    label.innerHTML = `<input type="checkbox" value="${key}" checked><span>${key} <span class="domain-check-count">(${counts[key]} q)</span></span>`;
    domainCheckList.appendChild(label);
  });
  domainCheckList.querySelectorAll('input').forEach(cb => cb.addEventListener('change', refreshPoolNote));
}

function refreshPoolNote(){
  const domains = currentSelectedDomains();
  const pool = computePool(domains, missedOnlyChk.checked);
  poolNote.textContent = `${pool.length} question${pool.length === 1 ? '' : 's'} available`;
  countInput.max = pool.length || 1;
  if(parseInt(countInput.value, 10) > pool.length) countInput.value = pool.length || 1;
}

function refreshSetupView(){
  missedOnlyChk.checked = false;
  const stats = loadMissed();
  const missedCount = QUESTIONS.filter(q => stats[q.id] && stats[q.id].missed > 0).length;
  missedOnlyRow.style.display = missedCount > 0 ? 'flex' : 'none';
  missedOnlyLabel.textContent = `Practice missed questions only (${missedCount} tracked)`;
  refreshPoolNote();
}

missedOnlyChk.addEventListener('change', refreshPoolNote);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const pool = computePool(currentSelectedDomains(), missedOnlyChk.checked);
    const val = parseInt(btn.dataset.count, 10);
    countInput.value = Math.min(val, pool.length || val);
  });
});

startBtn.addEventListener('click', () => {
  const domains = currentSelectedDomains();
  if(domains.length === 0){ alert('Select at least one domain.'); return; }
  const missedOnly = missedOnlyChk.checked;
  const pool = computePool(domains, missedOnly);
  if(pool.length === 0){ alert('No questions match these filters.'); return; }
  let count = parseInt(countInput.value, 10);
  if(!count || count < 1) count = pool.length;
  count = Math.min(count, pool.length);
  currentSettings = { domains, missedOnly, shuffleAnswers: shuffleAnswersChk.checked, count };
  startSession(pool, count);
});

function startSession(pool, count){
  const chosen = shuffle(pool).slice(0, count);
  ORDERED_QUESTIONS = chosen.map(q => prepareQuestion(q, currentSettings.shuffleAnswers));
  answers = new Array(ORDERED_QUESTIONS.length).fill(null);
  flagged = new Array(ORDERED_QUESTIONS.length).fill(false);
  current = 0;
  sessionCompleted = false;
  startTime = Date.now();
  setupView.classList.add('hide');
  resultsView.classList.remove('show');
  quizView.classList.remove('hide');
  buildPathBar();
  renderQuestion();
  startTimer();
}

function buildPathBar(){
  pathBar.innerHTML = '';
  ORDERED_QUESTIONS.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'seg';
    seg.dataset.idx = i;
    pathBar.appendChild(seg);
  });
}

function updatePathBar(){
  const segs = pathBar.children;
  for(let i=0;i<segs.length;i++){
    segs[i].className = 'seg';
    if(i === current) segs[i].classList.add('current');
    if(answers[i] !== null){
      segs[i].classList.add(answers[i] === ORDERED_QUESTIONS[i].c ? 'correct' : 'incorrect');
    }
    if(flagged[i]) segs[i].classList.add('flagged');
  }
}

function updateFlagBtn(){
  flagBtn.classList.toggle('active', !!flagged[current]);
  flagBtn.textContent = flagged[current] ? '🚩 Flagged' : '🚩 Flag';
}

function renderQuestion(){
  const item = ORDERED_QUESTIONS[current];
  qcount.textContent = `Question ${current+1} / ${ORDERED_QUESTIONS.length}`;
  domainTag.textContent = domainKey(item.d);
  qtext.textContent = item.q;
  optsWrap.innerHTML = '';
  explainBox.classList.remove('show');
  explainBox.innerHTML = '';

  const answeredSoFar = answers.filter(a => a !== null).length;
  const correctSoFar = answers.reduce((acc, a, i) => acc + (a !== null && a === ORDERED_QUESTIONS[i].c ? 1 : 0), 0);
  liveScoreEl.textContent = answeredSoFar > 0
    ? `Score: ${correctSoFar}/${answeredSoFar} (${pctOf(correctSoFar, answeredSoFar)}%)`
    : `Score: ${correctSoFar}/${answeredSoFar}`;

  const letters = ['A','B','C','D'];
  const selected = answers[current];
  pending = selected !== null ? selected : null;

  item.o.forEach((optText, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${optText}</span>`;
    if(selected !== null){
      btn.disabled = true;
      if(i === item.c) btn.classList.add('reveal-correct');
      if(i === selected && selected !== item.c) btn.classList.add('selected-incorrect');
      if(i === selected && selected === item.c) btn.classList.add('selected-correct');
    } else {
      btn.addEventListener('click', () => choosePending(i));
    }
    optsWrap.appendChild(btn);
  });

  if(selected !== null){
    const verdictLabel = selected === item.c ? 'Correct.' : `Not quite — the correct answer is ${letters[item.c]}.`;
    explainBox.innerHTML = `<b>${verdictLabel}</b><br><br><b>Explanation:</b> ${item.e}`;
    explainBox.classList.add('show');
    nextBtn.disabled = false;
    nextBtn.textContent = current === ORDERED_QUESTIONS.length - 1 ? 'See Results →' : 'Next →';
    nextBtn.dataset.mode = 'advance';
  } else {
    nextBtn.disabled = true;
    nextBtn.textContent = 'Submit Answer';
    nextBtn.dataset.mode = 'submit';
  }

  prevBtn.disabled = current === 0;
  updateFlagBtn();
  updatePathBar();
}

function choosePending(i){
  if(answers[current] !== null) return;
  pending = i;
  const opts = optsWrap.querySelectorAll('.opt');
  opts.forEach((btn, idx) => btn.classList.toggle('pending', idx === i));
  nextBtn.disabled = false;
}

function submitAnswer(){
  if(pending === null || answers[current] !== null) return;
  answers[current] = pending;
  const item = ORDERED_QUESTIONS[current];
  recordAnswerStat(item.id, pending === item.c);
  renderQuestion();
}

nextBtn.addEventListener('click', () => {
  if(nextBtn.dataset.mode === 'submit'){
    submitAnswer();
    return;
  }
  if(current === ORDERED_QUESTIONS.length - 1){
    showResults();
  } else {
    current++;
    renderQuestion();
  }
});

prevBtn.addEventListener('click', () => {
  if(current > 0){
    current--;
    renderQuestion();
  }
});

flagBtn.addEventListener('click', () => {
  flagged[current] = !flagged[current];
  updateFlagBtn();
  updatePathBar();
});

pathBar.addEventListener('click', (e) => {
  const seg = e.target.closest('.seg');
  if(!seg) return;
  const idx = parseInt(seg.dataset.idx, 10);
  if(answers[idx] !== null || idx <= current){
    current = idx;
    renderQuestion();
  }
});

function showResults(){
  clearInterval(timerInterval);
  sessionCompleted = true;
  quizView.classList.add('hide');
  resultsView.classList.add('show');

  const total = ORDERED_QUESTIONS.length;
  const correctCount = answers.reduce((acc, a, i) => acc + (a === ORDERED_QUESTIONS[i].c ? 1 : 0), 0);
  const pct = pctOf(correctCount, total);
  document.getElementById('finalScore').innerHTML = `${correctCount}/${total} <span class="score-pct">${pct}%</span>`;
  let verdict;
  if(pct >= 90) verdict = "Strong readiness. Skim any domain below with a lower bar before test day.";
  else if(pct >= 75) verdict = "Good foundation. Give extra attention to Platform Solutions, Services & Tools — it's 30% of the real exam.";
  else verdict = "Worth another pass through the study guide, domain by domain, focusing on whichever bars below are shortest.";
  document.getElementById('verdictText').textContent = `${pct}% correct. ${verdict}`;

  const domains = {};
  ORDERED_QUESTIONS.forEach((q, i) => {
    const key = domainKey(q.d);
    if(!domains[key]) domains[key] = {correct:0, total:0};
    domains[key].total++;
    if(answers[i] === q.c) domains[key].correct++;
  });

  const breakdown = document.getElementById('domainBreakdown');
  breakdown.innerHTML = '';
  Object.keys(domains).forEach(key => {
    const d = domains[key];
    const p = pctOf(d.correct, d.total);
    const row = document.createElement('div');
    row.className = 'domain-row';
    row.innerHTML = `
      <div class="domain-name">${key}</div>
      <div class="domain-bar-track"><div class="domain-bar-fill" style="width:${p}%;"></div></div>
      <div class="domain-score">${d.correct}/${d.total} (${p}%)</div>
    `;
    breakdown.appendChild(row);
  });

  recordAttempt({
    date: new Date().toISOString(),
    score: correctCount,
    total: total,
    pct: pct,
    missedOnly: currentSettings ? currentSettings.missedOnly : false,
    incomplete: false
  });
}

function exitToMainMenu(){
  clearInterval(timerInterval);
  if(!sessionCompleted){
    const answeredCount = answers.filter(a => a !== null).length;
    if(answeredCount > 0){
      const correctCount = answers.reduce((acc, a, i) => acc + (a === ORDERED_QUESTIONS[i].c ? 1 : 0), 0);
      recordAttempt({
        date: new Date().toISOString(),
        score: correctCount,
        total: answeredCount,
        pct: Math.round((correctCount/answeredCount)*100),
        missedOnly: currentSettings ? currentSettings.missedOnly : false,
        incomplete: true,
        sessionLength: ORDERED_QUESTIONS.length
      });
    }
  }
  quizView.classList.add('hide');
  resultsView.classList.remove('show');
  setupView.classList.remove('hide');
  refreshSetupView();
}

mainMenuBtn.addEventListener('click', () => {
  if(sessionCompleted){
    exitToMainMenu();
    return;
  }
  const answeredCount = answers.filter(a => a !== null).length;
  const msg = answeredCount > 0
    ? `Return to the main menu? You've answered ${answeredCount}/${ORDERED_QUESTIONS.length} — that will be logged as an incomplete attempt in your history, and any questions you already got wrong are already tracked as missed.`
    : 'Return to the main menu? No answers have been submitted yet in this attempt.';
  if(confirm(msg)) exitToMainMenu();
});

retryBtn.addEventListener('click', () => {
  const pool = computePool(currentSettings.domains, currentSettings.missedOnly);
  if(pool.length === 0){
    alert('No questions match your last settings anymore — try New Exam Setup instead.');
    return;
  }
  startSession(pool, Math.min(currentSettings.count, pool.length));
});

reviewBtn.addEventListener('click', () => {
  current = 0;
  resultsView.classList.remove('show');
  quizView.classList.remove('hide');
  renderQuestion();
});

newSetupBtn.addEventListener('click', () => {
  resultsView.classList.remove('show');
  quizView.classList.add('hide');
  setupView.classList.remove('hide');
  refreshSetupView();
});

function renderAttemptsTab(){
  const list = loadHistory();
  if(list.length === 0){
    attemptsTab.innerHTML = '<p style="color:var(--muted);font-size:13.5px;">No attempts recorded yet.</p>';
    return;
  }
  attemptsTab.innerHTML = list.map(rec => {
    const dt = new Date(rec.date);
    const dateStr = dt.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'}) + ' ' + dt.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'});
    const tags = [];
    if(rec.missedOnly) tags.push('<span class="hist-tag">missed-only</span>');
    if(rec.incomplete) tags.push(`<span class="hist-tag" style="border-color:var(--bad);color:var(--bad);">exited early · ${rec.total}/${rec.sessionLength} answered</span>`);
    return `<div class="hist-row">
      <div class="hist-score">${rec.score}/${rec.total} <span class="hist-pct">(${rec.pct}%)</span></div>
      <div class="hist-date">${dateStr} ${tags.join(' ')}</div>
    </div>`;
  }).join('');
}

function renderMissedTab(){
  const stats = loadMissed();
  const rows = QUESTIONS
    .filter(q => stats[q.id] && stats[q.id].missed > 0)
    .map(q => ({ q, s: stats[q.id] }))
    .sort((a, b) => (b.s.missed/b.s.seen) - (a.s.missed/a.s.seen) || b.s.missed - a.s.missed);

  if(rows.length === 0){
    missedTab.innerHTML = '<p style="color:var(--muted);font-size:13.5px;">No missed questions tracked yet — take an exam first.</p>';
    return;
  }
  missedTab.innerHTML = rows.map(({q, s}) => `
    <div class="hist-row">
      <div class="hist-domain">${domainKey(q.d)}</div>
      <div class="hist-qtext">${q.q}</div>
      <div class="hist-date">Missed ${s.missed}/${s.seen} time${s.seen === 1 ? '' : 's'} (${pctOf(s.missed, s.seen)}%)</div>
    </div>
  `).join('');
}

function openHistoryModal(){
  renderAttemptsTab();
  renderMissedTab();
  historyModal.classList.add('show');
}

historyBtn.addEventListener('click', openHistoryModal);
closeHistoryBtn.addEventListener('click', () => historyModal.classList.remove('show'));
historyModal.addEventListener('click', (e) => {
  if(e.target === historyModal) historyModal.classList.remove('show');
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    attemptsTab.style.display = tab === 'attempts' ? 'block' : 'none';
    missedTab.style.display = tab === 'missed' ? 'block' : 'none';
  });
});

clearHistoryBtn.addEventListener('click', () => {
  if(confirm('Clear all attempt history and missed-question tracking? This cannot be undone.')){
    localStorage.removeItem('nsp_history');
    localStorage.removeItem('nsp_missed');
    renderAttemptsTab();
    renderMissedTab();
    refreshSetupView();
  }
});

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if(key === 'escape' && historyModal.classList.contains('show')){
    historyModal.classList.remove('show');
    return;
  }

  const activeTag = document.activeElement && document.activeElement.tagName;
  if(activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;
  if(historyModal.classList.contains('show')) return;
  if(quizView.classList.contains('hide')) return;

  const letterMap = {a:0, b:1, c:2, d:3, '1':0, '2':1, '3':2, '4':3};
  if(letterMap.hasOwnProperty(key)){
    if(answers[current] === null) choosePending(letterMap[key]);
    e.preventDefault();
    return;
  }
  if(key === 'enter' || key === ' '){
    if(!nextBtn.disabled) nextBtn.click();
    e.preventDefault();
    return;
  }
  if(key === 'arrowleft'){
    if(!prevBtn.disabled) prevBtn.click();
    e.preventDefault();
    return;
  }
  if(key === 'arrowright'){
    if(!nextBtn.disabled) nextBtn.click();
    e.preventDefault();
    return;
  }
  if(key === 'f'){
    flagBtn.click();
    e.preventDefault();
  }
});

function startTimer(){
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const secs = Math.floor((Date.now() - startTime)/1000);
    const m = String(Math.floor(secs/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    timerEl.textContent = `${m}:${s}`;
  }, 1000);
}

populateDomainChecklist();
refreshSetupView();
</script>
</body>
</html>
